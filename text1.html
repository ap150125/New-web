<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPIDER-MAN</title>
 <link rel="icon" type="image/png" href="favicon.png">
    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background-color:aqua;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            padding:20px;
            font-family:Arial, sans-serif;
        }

        .part{
            display:flex;
            align-items:center;
            justify-content:center;
            gap:40px;
            flex-wrap:wrap;
            width:100%;
            max-width:900px;
        }

        .img img{
            width:100%;
            max-width:300px;
            height:auto;
            border-radius:10px;
        }

        .button{
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .music{
            padding:15px 25px;
            cursor:pointer;
            font-family:'Franklin Gothic Medium','Arial Narrow',Arial,sans-serif;
            font-size:22px;
            color:red;
            border:2px solid brown;
            border-radius:10px;
            background:white;
            transition:0.3s;
        }

        .music:hover{
            box-shadow:8px 8px 15px black;
            transform:scale(1.05);
        }

        /* Mobile View */
        @media (max-width:768px){

            .part{
                flex-direction:column;
                gap:30px;
            }

            .img img{
                max-width:90%;
            }

            .music{
                width:90vw;
                max-width:300px;
                font-size:20px;
            }

        }

    </style>
</head>

<body>

    <div class="part">

        <div class="img">
            <img src="SM.png" alt="Spider-Man">
        </div>

        <div class="button">
            <button onclick="toggleAudio()" class="music">
                Hey Everyone
            </button>
        </div>

    </div>

    <audio id="myAudio">
        <source src="h1.mp3" type="audio/mpeg">
    </audio>

    <script>

        const audio = document.getElementById("myAudio");

        function toggleAudio(){
        audio.volume = 10.0;
            if(audio.paused){
                audio.play();
            }else{
                audio.pause();
                audio.currentTime = 0;
            }

        }

    </script>

</body>

</html>
