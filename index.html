<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMAGE DISPLAY</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background-color:aqua;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            padding:20px;
            font-family:Arial, sans-serif;
        }

        .container{
            display:flex;
            align-items:center;
            justify-content:center;
            gap:40px;
            max-width:1000px;
            width:100%;
        }

        .container img{
            width:100%;
            max-width:450px;
            height:auto;
            border-radius:10px;
        }

        .b-container{
            display:flex;
            flex-direction:column;
            gap:15px;
        }

        .button{
            width:220px;
            padding:15px;
            font-size:20px;
            border-type:solid;
            border-radius:12px;
            cursor:pointer;
            transition:0.3s;
        }

        .button:hover{
            background:black;
            color:wheat;
        }

        /* Mobile View */
        @media (max-width:768px){

            .container{
                flex-direction:column;
                gap:25px;
            }

            .container img{
                max-width:90%;
            }

            .button{
                width:90vw;
                max-width:300px;
            }

        }
    </style>
</head>

<body>

    <div class="container">

        <a href="text.html">
            <img src="IM.png" alt="Image">
        </a>

        <div class="b-container">
            <button class="button">LIKE</button>
            <button class="button">SHARE</button>
            <button class="button">SUBSCRIBE</button>
        </div>

    </div>

</body>

</html>
